<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belgium Grid Capacity — DC Site Finder</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:sans-serif; background:#0d1117; color:#e6edf3;}
    .app { display:flex; height:100vh;}
    #map { flex:3; }

    .panel {
      flex:1;
      background:#161b22;
      padding:16px;
      display:flex;
      flex-direction:column;
    }

    .mw-display { font-size:2rem; text-align:center; }
    .ctrl { margin-bottom:20px; }

    input[type=range] { width:100%; }

    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat { background:#21262d; padding:10px; text-align:center; }

    .green { color:#3fb950; }
    .red { color:#f85149; }

    .insight {
      margin-top:20px;
      padding:10px;
      background:#1c2128;
      font-size:0.8rem;
    }

    #loading {
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
      z-index:999;
    }
  </style>
</head>

<body>

<div id="loading">Loading grid model…</div>

<div class="app">
  <div id="map"></div>

  <div class="panel">
    <h2>🇧🇪 Grid Capacity Model</h2>
    <small>Model based on public grid data (Elia)</small><br/>
    <small style="color:#8b949e;">
      Capacity is estimated — real availability depends on grid studies
    </small>

    <div class="ctrl">
      <div class="mw-display" id="mw-display">100 MW</div>
      <input type="range" id="mw-slider" min="10" max="500" step="10" value="100"/>
    </div>

    <div class="ctrl">
      <div class="mw-display" id="flex-display">0%</div>
      <input type="range" id="flex-slider" min="0" max="20" step="5" value="0"/>
    </div>

    <div class="stats">
      <div class="stat"><div id="s-ok" class="green">0</div>OK</div>
      <div class="stat"><div id="s-blocked" class="red">0</div>Blocked</div>
      <div class="stat"><div id="s-total">0</div>Total</div>
    </div>

    <div class="insight" id="insight-box"></div>
  </div>
</div>

<script>
// DOM refs
const mw = document.getElementById('mw-slider');
const flexSlider = document.getElementById('flex-slider');

const sOk = document.getElementById('s-ok');
const sBlocked = document.getElementById('s-blocked');
const sTotal = document.getElementById('s-total');

const insightBox = document.getElementById('insight-box');

// Map
const map = L.map('map').setView([50.65, 4.5], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Data
let substations = [
  { name:"Brussels", lat:50.85, lng:4.35, voltage:150 },
  { name:"Antwerp", lat:51.22, lng:4.40, voltage:380 },
  { name:"Ghent", lat:51.05, lng:3.72, voltage:380 }
];

// Deterministic MW
function estimateMw(voltage, name) {
  const base = voltage === 380 ? 350 : 150;
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return base + (Math.abs(hash) % 200);
}

substations = substations.map(s => ({
  ...s,
  availableMw: estimateMw(s.voltage, s.name)
}));

// Render
function render() {
  map.eachLayer(l => {
    if (l instanceof L.CircleMarker) map.removeLayer(l);
  });

  const target = +mw.value;
  const flex = +flexSlider.value;
  const effective = target * (1 - flex/100);

  document.getElementById('mw-display').textContent = target + ' MW';
  document.getElementById('flex-display').textContent = flex + '%';

  let ok = 0, blocked = 0;

  substations.forEach(s => {
    const status = s.availableMw >= effective ? 'ok' : 'blocked';
    if(status==='ok') ok++; else blocked++;

    L.circleMarker([s.lat, s.lng], {
      radius: Math.sqrt(s.availableMw),
      fillColor: status==='ok' ? '#3fb950' : '#f85149',
      fillOpacity: 0.7,
      color:'#000',
      weight:1
    }).addTo(map);
  });

  sOk.textContent = ok;
  sBlocked.textContent = blocked;
  sTotal.textContent = substations.length;

  insightBox.innerHTML = flex === 0
    ? `At ${target} MW → ${ok}/${substations.length} substations work`
    : `${flex}% flexibility reduces demand to ${Math.round(effective)} MW`;
}

// Events
mw.addEventListener('input', render);
flexSlider.addEventListener('input', render);

// Init
render();
document.getElementById('loading').style.display='none';
</script>

</body>
</html>
